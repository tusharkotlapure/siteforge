<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{seo_title}}</title>
  <meta name="description" content="{{seo_description}}" />
  <meta name="theme-color" content="{{theme_color}}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<nav>
  <div class="nav-inner container">
    <a href="index.html" class="nav-logo">{{logo_text}}</a>
    <ul class="nav-links">
      <li><a href="index.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </div>
</nav>

<section class="section" style="padding-top: 8rem;">
  <div class="container">
    <div class="contact-layout">
      <div class="contact-cta">
        <div class="section-label">Get In Touch</div>
        <h2>{{contact_heading}}</h2>
        <p>{{contact_desc}}</p>
        <a href="mailto:{{primary_email}}" class="btn btn-accent" style="display:inline-flex;">{{primary_email}} →</a>
        <div class="social-links" style="justify-content:flex-start;margin-top:2rem;">
          <a href="{{github_url}}" class="social-link" target="_blank">GH</a>
          <a href="{{linkedin_url}}" class="social-link" target="_blank">LI</a>
          <a href="{{twitter_url}}" class="social-link" target="_blank">TW</a>
        </div>
      </div>
      <div>
        <form class="contact-form" id="contact-form">
          <div class="form-group">
            <label>Your Name</label>
            <input type="text" placeholder="Jane Smith" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="jane@example.com" required />
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Tell me about your project..."></textarea>
          </div>
          <button type="submit" class="btn btn-accent">Send Message →</button>
        </form>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <p>© {{current_year}} {{site_name}} · Built with care</p>
  </div>
</footer>

<script src="assets/js/script.js"></script>
</body>
</html>
